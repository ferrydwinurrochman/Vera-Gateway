kind = "web"
previewPath = "/"
title = "VERA GATE"
version = "1.0.0"
id = "artifacts/vera-gate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22415

[services.development]
run = "pnpm --filter @workspace/vera-gate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vera-gate", "run", "build" ]
publicDir = "artifacts/vera-gate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22415"
BASE_PATH = "/"
